apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: piholerecords.dns.sifft.io
spec:
  group: dns.sifft.io
  names:
    kind: PiholeRecord
    plural: piholerecords
    singular: piholerecord
    shortNames:
      - phr
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["hostname", "ip"]
              properties:
                hostname:
                  type: string
                ip:
                  type: string
                  pattern: '^(\d{1,3}\.){3}\d{1,3}$'
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
